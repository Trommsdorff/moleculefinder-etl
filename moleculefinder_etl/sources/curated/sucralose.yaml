# Hand-authored marquee overlay. Sucralose is the sweetest of the everyday
# tabletop sweeteners, so it tops the "sweetest" leaderboard.
cid: 71485
slug: sucralose
tier: marquee
relative_sweetness: 600         # ~600x sucrose (commonly cited)
types:
