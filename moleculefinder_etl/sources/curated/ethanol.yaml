# Hand-authored marquee overlay. Ethanol clears at a roughly zero-order rate, so
# it gets the Widmark BAC hook (auto-enabled for CID 702) rather than the
# first-order still-in-your-system decay curve — no half_life here on purpose.
cid: 702
slug: ethanol
tier: marquee
foods:
  - { category: beer,    note: "~5% alcohol by volume" }
  - { category: wine,    note: "~12% alcohol by volume" }
  - { category: spirits, note: "~40% alcohol by volume" }
smell_card:
  experience: "the sharp warmth of liquor"
  detection: "highly volatile; sensed by smell and as a burn"
editorial: |
  Ethanol is the one recreational drug humans have fermented for at least nine
  thousand years. The body clears it at a roughly fixed rate, about one
  standard drink per hour, which is why its math is a Widmark BAC curve rather
  than a half-life decay.
