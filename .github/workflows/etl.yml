name: etl
on:
  schedule: [{ cron: "0 6 * * 1" }]     # weekly, Mondays 06:00 UTC (also keeps Supabase warm)
  workflow_dispatch: {}
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e .
      - run: mfetl all --target 10000
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_SHA:           ${{ github.sha }}
      - name: commit snapshot
        run: |
          git add data/snapshots data/seed
          git commit -m "etl: refresh $(date -u +%F)" || echo "no changes"
          git push
      - name: trigger deploy
        run: curl -fsSL -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
