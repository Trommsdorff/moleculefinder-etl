# Curated over-the-counter brand / commercial names (follow-up: "also known as Advil / Benadryl").
# PubChem synonyms carry brand names inconsistently, so we curate the recognizable US consumer
# brands per generic drug. Shown on the molecule page as an "Also sold as" line and folded into
# the search index so a search for "Advil" finds ibuprofen. slug -> [brands], most iconic first.
# Compiled by transform/relationships.py::attach_brands, which validates every slug against the
# snapshot and fails the build on a typo. Facts, confidence from_source / MoleculeFinder curated.

