# household_must_include.yaml  (hand-maintained, hand-curated on purpose)
# -----------------------------------------------------------------------------
# Permanent MUST-INCLUDE seed for MoleculeFinder. These molecules are force-added
# to the canon on EVERY run via the marquee-seed union (the same mechanism that
# guarantees glucose), regardless of Wikidata linkage or Wikipedia traffic rank.
#
# Why this file exists: ranking the compound universe by Wikipedia traffic has two
# blind spots that silently drop molecules that clearly belong on a "molecules
# behind everything" site --
#   1. everyday/household chemistry (water, hydrogen peroxide, ammonia ...), and
#   2. proteins / biopolymers / mixtures that have no single clean PubChem compound
#      link (collagen, starch, gluten ...), the exact way glucose was almost lost.
#
# handling:
#   add-core   -> normal single compound; fetch by `cid` on the usual PubChem path.
#   hand-model -> NO single PubChem compound (cid: null). Route to the hand-modeled
#                 macromolecule path: no 2D/3D structure, no fabricated MW/SMILES;
#                 populate description/family/found-in/neighbors, every value
#                 carrying its confidence tag (curated / inferred).
#
# Do NOT auto-classify OTC-vs-Rx or everyday-vs-pharma here. The OTC/Rx line is
# country-dependent and classifiers proved unreliable; decide membership by hand.
# Edit freely: add or remove names; the pipeline reconciles on the next run.
molecules:
  - name: "Water"
    cid: 962
    bucket: everyday-chemistry
    family: inorganic
    is_otc: false
    dual_use: false
    handling: add-core
    tier: 1
